name: Send Daily Card

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  send-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Send card to Telegram
        run: node index.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
      - name: Update today.json for website
        run: |
          # Найти случайный PNG из корня
          CARD=$(ls *.png 2>/dev/null | sort -R | head -n 1)
          if [ -z "$CARD" ]; then
            echo "No PNG found"
            exit 1
          fi
          echo "{\"todayCard\": \"$CARD\"}" > today.json
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add today.json
          git commit -m "Update daily card: $CARD" || echo "No changes"
          git push
